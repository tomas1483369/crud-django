{% extends 'landing/index.html' %}

{% block content %}
<main class="container">
    <div class="row">
        <div class="col-md-4 offset-md-4 mt-5">
           <form method="POST" class="card card-body shadow">
                <h1 class="text-center">Registrarse</h1>

                {% if error %}
                    <div class="alert alert-danger p-2 text-center" role="alert" style="font-size: 0.9rem;">
                        <strong>Error:</strong> {{ error }}
                    </div>
                {% endif %}

                {%csrf_token%}
                
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario:</label>
                    <input type="text" name="username" id="username" class="form-control" placeholder="Escribe tu usuario" required>
                </div>

                <div class="mb-3">
                    <label for="password1" class="form-label">Contraseña:</label>
                    <input type="password" name="password1" id="password1" class="form-control" placeholder="Escribe tu contraseña" minlength="8" required>
                    <div class="form-text text-muted">
                        Minimo 8 caracteres.
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password2" class="form-label">Confirma tu contraseña:</label>
                    <input type="password" name="password2" id="password2" class="form-control" placeholder="Repite tu contraseña" required>
                </div>



                <button class="btn btn-danger w-100">
                    Iniciar Sesion
                </button>    

                <p class="text-center mt-3 small">
                    ¿Ya tienes cuenta? <a href="{% url 'signin' %}">Inicia sesion</a>
                </p>
            </form>
        </div>
    </div>  
</main>

{% endblock %}
